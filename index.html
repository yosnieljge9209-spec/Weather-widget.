<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiempo Bonao</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #191919;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    font-family: 'Inter', sans-serif;
    padding: 12px 14px;
  }

  .widget {
    background: #191919;
    width: 420px;
    height: 190px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    user-select: none;
    overflow: hidden;
  }

  /* ---- TOP ROW ---- */
  .top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #242424;
  }

  .temp-wrap { display: flex; align-items: baseline; gap: 2px; }
  .temp-big  { font-size: 42px; font-weight: 600; color: #e0e0e0; line-height: 1; letter-spacing: -2px; }
  .temp-unit { font-size: 16px; font-weight: 300; color: #555; }

  .meta { flex: 1; }
  .city  { font-size: 12px; font-weight: 600; color: #c8c8c8; }
  .desc  { font-size: 10px; color: #555; margin-top: 1px; }
  .hilo  { font-size: 10px; color: #484848; margin-top: 1px; }

  .w-icon { font-size: 32px; line-height: 1; opacity: 0.85; }

  /* ---- PARAMS ---- */
  .params {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
  }

  .param {
    background: #212121;
    border: 1px solid #272727;
    border-radius: 6px;
    padding: 5px 6px 4px;
  }
  .p-label { font-size: 8px; font-weight: 500; color: #3e3e3e; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
  .p-val   { font-size: 13px; font-weight: 600; color: #c0c0c0; line-height: 1; }
  .p-unit  { font-size: 9px; font-weight: 400; color: #464646; }
  .p-sub   { font-size: 9px; color: #3e3e3e; margin-top: 1px; }

  .uv-bar  { height: 2px; border-radius: 2px; background: linear-gradient(90deg,#4caf50,#ffeb3b,#ff5722); margin-top: 4px; position: relative; }
  .uv-dot  { position: absolute; top: -3px; width: 7px; height: 7px; border-radius: 50%; background: #c0c0c0; transform: translateX(-50%); }

  /* ---- HOURLY ---- */
  .hourly { display: flex; gap: 5px; overflow: hidden; }

  .h-cell {
    flex: 1;
    background: #212121;
    border: 1px solid #272727;
    border-radius: 6px;
    padding: 5px 4px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 0;
  }
  .h-cell.now { border-color: #c8622a; background: #221a14; }

  .h-time { font-size: 8px; color: #3e3e3e; white-space: nowrap; }
  .h-cell.now .h-time { color: #c8622a; }
  .h-icon { font-size: 14px; }
  .h-temp { font-size: 11px; font-weight: 600; color: #c0c0c0; }
  .h-wind { font-size: 8px; color: #363636; }

  /* loading */
  .loading { font-size: 10px; color: #3a3a3a; padding: 8px 0; }
</style>
</head>
<body>
<div class="widget">
  <div class="loading" id="loading">cargando…</div>
  <div id="content" style="display:contents"></div>
</div>

<script>
const LAT=18.9402, LON=-70.4072;
const WMO={
  0:['Despejado','☀️'],1:['Casi despejado','🌤️'],2:['Parcialmente nublado','⛅'],
  3:['Nublado','☁️'],45:['Niebla','🌫️'],51:['Llovizna','🌦️'],53:['Llovizna','🌦️'],
  61:['Lluvia leve','🌧️'],63:['Lluvia','🌧️'],65:['Lluvia fuerte','🌧️'],
  80:['Chubascos','🌦️'],95:['Tormenta','⛈️'],99:['Tormenta fuerte','⛈️'],
};
const wmo=c=>WMO[c]||['Variable','🌡️'];
const uvLbl=u=>u<=2?'Débil':u<=5?'Mod.':u<=7?'Alto':'M.Alto';
const wdir=d=>['N','NE','E','SE','S','SO','O','NO'][Math.round(d/45)%8];
const fmtH=t=>new Date(t).getHours().toString().padStart(2,'0')+':00';

async function load(){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
    +`&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,`
    +`wind_speed_10m,wind_direction_10m,uv_index,precipitation,surface_pressure,visibility`
    +`&hourly=temperature_2m,weather_code,wind_speed_10m`
    +`&daily=temperature_2m_max,temperature_2m_min`
    +`&timezone=America%2FSanto_Domingo&forecast_days=2`;
  return (await fetch(url)).json();
}

function render(d){
  const c=d.current,h=d.hourly;
  const[desc,icon]=wmo(c.weather_code);
  const temp=Math.round(c.temperature_2m),feels=Math.round(c.apparent_temperature);
  const tmax=Math.round(d.daily.temperature_2m_max[0]),tmin=Math.round(d.daily.temperature_2m_min[0]);
  const uv=+(c.uv_index??0).toFixed(1);
  const now=new Date();

  const hours=[];
  for(let i=0;i<h.time.length&&hours.length<6;i++){
    if(new Date(h.time[i])>=now)
      hours.push({time:h.time[i],temp:Math.round(h.temperature_2m[i]),
        code:h.weather_code[i],wind:Math.round(h.wind_speed_10m[i])});
  }

  const cells=hours.map((hr,i)=>{
    const[,hico]=wmo(hr.code);
    return `<div class="h-cell ${i===0?'now':''}">
      <div class="h-time">${i===0?'Ahora':fmtH(hr.time)}</div>
      <div class="h-icon">${hico}</div>
      <div class="h-temp">${hr.temp}°</div>
      <div class="h-wind">${hr.wind}km/h</div>
    </div>`;
  }).join('');

  document.getElementById('loading').style.display='none';
  const el=document.getElementById('content');
  el.innerHTML=`
    <div class="top">
      <div class="temp-wrap"><div class="temp-big">${temp}</div><div class="temp-unit">°C</div></div>
      <div class="meta">
        <div class="city">Bonao, RD</div>
        <div class="desc">${desc}</div>
        <div class="hilo">${tmax}° / ${tmin}° &nbsp;·&nbsp; Sensación ${feels}°</div>
      </div>
      <div class="w-icon">${icon}</div>
    </div>
    <div class="params">
      <div class="param"><div class="p-label">Humedad</div><div class="p-val">${c.relative_humidity_2m}<span class="p-unit">%</span></div></div>
      <div class="param"><div class="p-label">Viento</div><div class="p-val">${Math.round(c.wind_speed_10m)}<span class="p-unit">km/h</span></div><div class="p-sub">${wdir(c.wind_direction_10m)}</div></div>
      <div class="param"><div class="p-label">Presión</div><div class="p-val">${Math.round(c.surface_pressure)}<span class="p-unit">hPa</span></div></div>
      <div class="param"><div class="p-label">Precipit.</div><div class="p-val">${c.precipitation??0}<span class="p-unit">mm</span></div></div>
      <div class="param"><div class="p-label">Visib.</div><div class="p-val">${c.visibility?(c.visibility/1000).toFixed(1):'—'}<span class="p-unit">km</span></div></div>
      <div class="param"><div class="p-label">UV·${uvLbl(uv)}</div><div class="p-val">${uv}</div><div class="uv-bar"><div class="uv-dot" style="left:${Math.min(uv/11*100,100).toFixed(1)}%"></div></div></div>
    </div>
    <div class="hourly">${cells}</div>`;
}

async function update(){
  try{render(await load());}
  catch(e){document.getElementById('loading').textContent='Error al cargar.';}
}
update();
setInterval(update,10*60*1000);
</script>
</body>
</html>
